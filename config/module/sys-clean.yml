# 系统清理配置文件示例
# 用法: kite sys clean --config config/module/sys-clean.yml
#
# 配置说明：
# - 所有配置项均为可选，未设置时使用默认值
# - 可以通过命令行参数覆盖配置文件中的设置
# - 自定义规则会追加到预设规则列表中

# ===========================================
# 扫描配置
# ===========================================

# 扫描目录列表，默认为用户主目录
scan_dirs:
  - ~/
  # - ~/projects
  # - ~/Downloads

# 排除目录（不扫描这些目录）
exclude_dirs:
  - .git
  - .svn
  - .hg
  - node_modules
  - vendor
  # - ".idea"
  # - ".vscode"

# 最大扫描深度，-1 表示无限制
max_depth: -1

# 并发扫描数，默认 5
concurrency: 5

# ===========================================
# 规则配置
# ===========================================

# 指定使用的规则名称（为空则使用所有启用的规则）
rule_names:
  - node_modules
  - log_files
  - temp_files
  # - python_cache
  # - go_build_cache

# 按类别过滤（可选值: cache, log, temp, build, dependency, ide, system, custom）
# categories:
#   - cache
#   - temp
#   - log

# ===========================================
# 行为配置
# ===========================================

# 预览模式，true 只扫描不删除
dry_run: true

# 使用回收站而非直接删除
use_trash: true

# 跳过确认提示
yes: false

# 强制执行高风险操作
force: false

# ===========================================
# 缓存配置
# ===========================================

# 是否使用缓存
use_cache: true

# 缓存有效期，默认 3 分钟
cache_ttl: 3m

# 缓存文件路径（可选，默认 ~/.kite-go/tmp/sys-clean/scan-cache.json）
# cache_file: ~/.kite-go/tmp/sys-clean/scan-cache.json

# ===========================================
# 输出配置
# ===========================================

# 输出格式: text, markdown, json
output_format: markdown

# 输出文件路径（可选）
# output_file: ./clean-report.md

# 详细输出
verbose: false

# ===========================================
# 自定义规则（可选）
# ===========================================
# 自定义规则会追加到预设规则列表中

rules:
  # 示例1: 清理项目构建缓存
  - name: my_project_build_cache
    description: "项目构建缓存目录"
    category: cache
    target_type: dir
    name_matches:
      - ".cache"
      - "dist"
      - "build-output"
    risk_level: 1
    enabled: true

  # 示例2: 清理旧日志文件
  - name: old_logs_30days
    description: "30天前的日志文件"
    category: log
    target_type: file
    file_exts:
      - ".log"
      - ".log.gz"
    max_age: 30  # 超过30天的文件
    risk_level: 1
    enabled: true

  # 示例3: 清理特定项目缓存
  - name: project_specific_cache
    description: "特定项目的缓存"
    category: cache
    target_type: dir
    base_paths:
      - ~/projects/*/cache
      - ~/projects/*/tmp
    risk_level: 2
    enabled: true
    confirm_msg: "将删除项目缓存目录"

  # 示例4: 清理大文件
  - name: large_temp_files
    description: "大于100MB的临时文件"
    category: temp
    target_type: file
    file_exts:
      - ".tmp"
      - ".temp"
    min_size: 104857600  # 100MB (字节)
    risk_level: 2
    enabled: true

  # 示例5: 清理备份文件
  - name: backup_files
    description: "备份文件"
    category: temp
    target_type: file
    patterns:
      - "*.bak"
      - "*.backup"
      - "*~"
    risk_level: 1
    enabled: true

  # 示例6: 仅 Windows 平台规则
  - name: windows_specific
    description: "Windows 特定清理"
    category: system
    target_type: dir
    base_paths:
      - ~/AppData/Local/MyApp/Cache
    platforms:
      - windows
    risk_level: 1
    enabled: true

  # 示例7: 仅 macOS 平台规则
  - name: macos_specific
    description: "macOS 特定清理"
    category: cache
    target_type: dir
    base_paths:
      - ~/Library/Caches/MyApp
    platforms:
      - darwin
    risk_level: 1
    enabled: true

  # 示例8: 仅 Linux 平台规则
  - name: linux_specific
    description: "Linux 特定清理"
    category: cache
    target_type: dir
    base_paths:
      - ~/.cache/myapp
    platforms:
      - linux
    risk_level: 1
    enabled: true
